name: water_plant_app
description: "A premium Flutter app to track water plant distributions, with Socket.IO live sync and FCM background notifications."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Utilities
  cupertino_icons: ^1.0.6
  http: ^1.2.1
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  provider: ^6.1.2

  # Real-time synchronization
  socket_io_client: ^2.0.3+1

  # Push notifications stack
  firebase_core: ^2.30.1
  firebase_messaging: ^14.9.1
  flutter_local_notifications: ^17.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
